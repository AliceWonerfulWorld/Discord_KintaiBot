services:
  - type: worker
    name: discord-kintai-bot
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm ci && npm run build -w @discord-kintai/bot
    startCommand: npm run start -w @discord-kintai/bot
    envVars:
      - key: NODE_ENV
        value: production
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: DISCORD_TEAM_VIEWER_ROLE_IDS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
